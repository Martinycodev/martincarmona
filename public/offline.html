<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión — MiOlivar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 12px;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #999;
        }
        .btn-retry {
            display: inline-block;
            padding: 12px 32px;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            min-height: 48px;
        }
        .btn-retry:active {
            background: #388e3c;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Sin conexión</h1>
        <p>No se ha podido conectar con el servidor. Comprueba tu conexión a internet e inténtalo de nuevo.</p>
        <button class="btn-retry" onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
