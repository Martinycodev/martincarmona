<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Screenshots PWA — MartinCarmona</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #ccc; padding: 40px; text-align: center; }
        h1 { color: #4caf50; margin-bottom: 10px; }
        p { color: #999; margin-bottom: 30px; }
        .preview { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin: 30px 0; }
        .shot-box { background: #2a2a2a; border-radius: 10px; padding: 15px; }
        .shot-box canvas { display: block; margin: 0 auto 10px; border-radius: 8px; border: 1px solid #333; }
        .shot-box span { font-size: 13px; color: #999; }
        button { padding: 14px 40px; background: #4caf50; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin: 10px; }
        button:hover { background: #388e3c; }
        .done { color: #4caf50; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Generador de Screenshots PWA</h1>
    <p>Genera las capturas de pantalla necesarias para el diálogo de instalación PWA.</p>
    <div class="preview" id="preview"></div>
    <button onclick="downloadAll()">Descargar screenshots</button>
    <div id="status"></div>

    <script>
    var SCREENSHOTS = [
        { name: 'screenshot-desktop', width: 1280, height: 720, label: 'Desktop (1280x720)' },
        { name: 'screenshot-mobile', width: 750, height: 1334, label: 'Móvil (750x1334)' }
    ];

    function drawScreenshot(ctx, w, h) {
        // Fondo oscuro de la app
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(0, 0, w, h);

        // Header verde
        var headerH = h * 0.08;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, w, headerH);
        ctx.fillStyle = '#4caf50';
        ctx.font = 'bold ' + (headerH * 0.45) + 'px -apple-system, sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText('MartinCarmona', w * 0.03, headerH / 2);

        // Línea verde debajo del header
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, headerH, w, 2);

        // Cards simuladas
        var cardY = headerH + h * 0.05;
        var cardPad = w * 0.03;
        var isDesktop = w > h;

        if (isDesktop) {
            // Layout desktop: 3 cards en fila + gráfico debajo
            var cardW = (w - cardPad * 4) / 3;
            var cardH = h * 0.18;
            var labels = ['Tareas del mes', 'Trabajadores activos', 'Parcelas'];
            var values = ['24', '6', '12'];
            var icons = ['📋', '👷', '🌿'];

            for (var i = 0; i < 3; i++) {
                var cx = cardPad + i * (cardW + cardPad);
                // Card background
                ctx.fillStyle = '#2a2a2a';
                roundRect(ctx, cx, cardY, cardW, cardH, 10);
                ctx.fill();
                // Icon
                ctx.font = (cardH * 0.3) + 'px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(icons[i], cx + cardW / 2, cardY + cardH * 0.3);
                // Value
                ctx.font = 'bold ' + (cardH * 0.3) + 'px -apple-system, sans-serif';
                ctx.fillStyle = '#4caf50';
                ctx.fillText(values[i], cx + cardW / 2, cardY + cardH * 0.6);
                // Label
                ctx.font = (cardH * 0.14) + 'px -apple-system, sans-serif';
                ctx.fillStyle = '#999';
                ctx.fillText(labels[i], cx + cardW / 2, cardY + cardH * 0.82);
            }
            ctx.textAlign = 'left';

            // Gráfico simulado
            var chartY = cardY + cardH + h * 0.05;
            var chartW = w - cardPad * 2;
            var chartH = h * 0.45;
            ctx.fillStyle = '#2a2a2a';
            roundRect(ctx, cardPad, chartY, chartW, chartH, 10);
            ctx.fill();
            // Título del gráfico
            ctx.fillStyle = '#ccc';
            ctx.font = (chartH * 0.06) + 'px -apple-system, sans-serif';
            ctx.fillText('Productividad semanal', cardPad * 2, chartY + chartH * 0.1);
            // Barras
            var barCount = 7;
            var barW = (chartW - cardPad * 4) / barCount - 8;
            var maxBarH = chartH * 0.65;
            var barHeights = [0.6, 0.8, 0.5, 0.9, 0.7, 0.85, 0.4];
            for (var b = 0; b < barCount; b++) {
                var bx = cardPad * 2 + b * (barW + 8);
                var bh = maxBarH * barHeights[b];
                ctx.fillStyle = '#4caf50';
                roundRect(ctx, bx, chartY + chartH * 0.85 - bh, barW, bh, 4);
                ctx.fill();
            }
        } else {
            // Layout móvil: cards apiladas
            var cardW = w - cardPad * 2;
            var cardH = h * 0.1;
            var items = [
                { icon: '📋', label: 'Tareas del mes', value: '24' },
                { icon: '👷', label: 'Trabajadores activos', value: '6' },
                { icon: '🌿', label: 'Parcelas trabajadas', value: '12' },
                { icon: '💰', label: 'Balance mensual', value: '+2.450€' }
            ];

            for (var i = 0; i < items.length; i++) {
                var cy = cardY + i * (cardH + cardPad * 0.8);
                ctx.fillStyle = '#2a2a2a';
                roundRect(ctx, cardPad, cy, cardW, cardH, 10);
                ctx.fill();
                // Icon
                ctx.font = (cardH * 0.4) + 'px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(items[i].icon, cardPad * 2.5, cy + cardH / 2);
                // Label
                ctx.font = (cardH * 0.2) + 'px -apple-system, sans-serif';
                ctx.fillStyle = '#ccc';
                ctx.fillText(items[i].label, cardPad * 5, cy + cardH * 0.38);
                // Value
                ctx.font = 'bold ' + (cardH * 0.25) + 'px -apple-system, sans-serif';
                ctx.fillStyle = '#4caf50';
                ctx.fillText(items[i].value, cardPad * 5, cy + cardH * 0.68);
            }

            // Gráfico debajo
            var chartY = cardY + 4 * (cardH + cardPad * 0.8) + cardPad;
            var chartH = h * 0.3;
            ctx.fillStyle = '#2a2a2a';
            roundRect(ctx, cardPad, chartY, cardW, chartH, 10);
            ctx.fill();
            ctx.fillStyle = '#ccc';
            ctx.font = (chartH * 0.06) + 'px -apple-system, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Productividad semanal', cardPad * 2, chartY + chartH * 0.1);
            // Barras
            var barCount = 5;
            var barW = (cardW - cardPad * 4) / barCount - 6;
            var maxBarH = chartH * 0.6;
            var barHeights = [0.6, 0.8, 0.5, 0.9, 0.7];
            for (var b = 0; b < barCount; b++) {
                var bx = cardPad * 2 + b * (barW + 6);
                var bh = maxBarH * barHeights[b];
                ctx.fillStyle = '#4caf50';
                roundRect(ctx, bx, chartY + chartH * 0.85 - bh, barW, bh, 4);
                ctx.fill();
            }
        }

        // Footer
        var footerH = h * 0.04;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, h - footerH, w, footerH);
        ctx.fillStyle = '#666';
        ctx.font = (footerH * 0.5) + 'px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('© 2026 MartinCarmona.com', w / 2, h - footerH / 2);
        ctx.textAlign = 'left';
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // Generar previews
    SCREENSHOTS.forEach(function(shot) {
        var box = document.createElement('div');
        box.className = 'shot-box';

        var canvas = document.createElement('canvas');
        canvas.width = shot.width;
        canvas.height = shot.height;
        // Escalar preview
        var scale = Math.min(400 / shot.width, 350 / shot.height);
        canvas.style.width = (shot.width * scale) + 'px';
        canvas.style.height = (shot.height * scale) + 'px';
        canvas.id = shot.name;

        drawScreenshot(canvas.getContext('2d'), shot.width, shot.height);

        var label = document.createElement('span');
        label.textContent = shot.label;

        box.appendChild(canvas);
        box.appendChild(label);
        document.getElementById('preview').appendChild(box);
    });

    function downloadAll() {
        SCREENSHOTS.forEach(function(shot, i) {
            setTimeout(function() {
                var canvas = document.getElementById(shot.name);
                var link = document.createElement('a');
                link.download = shot.name + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }, i * 300);
        });
        document.getElementById('status').innerHTML = '<p class="done">Screenshots descargados. Muévelos a public/img/icons/</p>';
    }
    </script>
</body>
</html>
