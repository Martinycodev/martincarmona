<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de iconos PWA — MartinCarmona</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #ccc; padding: 40px; text-align: center; }
        h1 { color: #4caf50; }
        .preview { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 30px 0; }
        .icon-box { background: #2a2a2a; border-radius: 10px; padding: 15px; }
        .icon-box canvas { display: block; margin: 0 auto 8px; border-radius: 8px; }
        .icon-box span { font-size: 12px; color: #999; }
        button { padding: 14px 40px; background: #4caf50; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin: 10px; }
        button:hover { background: #388e3c; }
        .done { color: #4caf50; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Generador de iconos PWA</h1>
    <p>Este script genera los iconos PNG necesarios para la PWA de MartinCarmona.</p>
    <div class="preview" id="preview"></div>
    <button onclick="downloadAll()">Descargar todos los iconos</button>
    <div id="status"></div>

    <script>
    var SIZES = [72, 96, 128, 144, 152, 192, 384, 512];

    // Dibuja un olivo estilizado en el canvas
    function drawIcon(ctx, size) {
        var s = size / 512; // factor de escala respecto a 512px

        // Fondo verde oscuro con bordes redondeados
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, size, size);

        // Circulo de fondo verde sutil
        ctx.beginPath();
        ctx.arc(size / 2, size * 0.44, size * 0.38, 0, Math.PI * 2);
        ctx.fillStyle = '#2a3a2a';
        ctx.fill();

        // Tronco del olivo
        ctx.beginPath();
        ctx.moveTo(size * 0.46, size * 0.55);
        ctx.quadraticCurveTo(size * 0.44, size * 0.7, size * 0.42, size * 0.85);
        ctx.lineTo(size * 0.58, size * 0.85);
        ctx.quadraticCurveTo(size * 0.56, size * 0.7, size * 0.54, size * 0.55);
        ctx.closePath();
        ctx.fillStyle = '#8B6914';
        ctx.fill();

        // Raices/base
        ctx.beginPath();
        ctx.moveTo(size * 0.35, size * 0.87);
        ctx.quadraticCurveTo(size * 0.5, size * 0.82, size * 0.65, size * 0.87);
        ctx.lineWidth = size * 0.02;
        ctx.strokeStyle = '#8B6914';
        ctx.stroke();

        // Copa del olivo - varias elipses verdes superpuestas
        var foliage = [
            { x: 0.50, y: 0.32, rx: 0.22, ry: 0.18, color: '#388e3c' },
            { x: 0.38, y: 0.38, rx: 0.16, ry: 0.14, color: '#4caf50' },
            { x: 0.62, y: 0.38, rx: 0.16, ry: 0.14, color: '#4caf50' },
            { x: 0.45, y: 0.28, rx: 0.14, ry: 0.12, color: '#66bb6a' },
            { x: 0.57, y: 0.30, rx: 0.13, ry: 0.11, color: '#66bb6a' },
            { x: 0.50, y: 0.42, rx: 0.18, ry: 0.12, color: '#388e3c' },
            { x: 0.50, y: 0.22, rx: 0.10, ry: 0.09, color: '#81c784' }
        ];

        foliage.forEach(function(f) {
            ctx.beginPath();
            ctx.ellipse(size * f.x, size * f.y, size * f.rx, size * f.ry, 0, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.fill();
        });

        // Aceitunas pequeñas (puntos verde oscuro)
        var olives = [
            { x: 0.40, y: 0.36 },
            { x: 0.58, y: 0.34 },
            { x: 0.48, y: 0.42 },
            { x: 0.55, y: 0.44 },
            { x: 0.42, y: 0.28 },
            { x: 0.60, y: 0.40 }
        ];

        olives.forEach(function(o) {
            ctx.beginPath();
            ctx.arc(size * o.x, size * o.y, size * 0.018, 0, Math.PI * 2);
            ctx.fillStyle = '#2e7d32';
            ctx.fill();
            // Brillo
            ctx.beginPath();
            ctx.arc(size * o.x - size * 0.005, size * o.y - size * 0.005, size * 0.006, 0, Math.PI * 2);
            ctx.fillStyle = '#4caf50';
            ctx.fill();
        });

        // Texto "MC" debajo
        ctx.fillStyle = '#4caf50';
        ctx.font = 'bold ' + (size * 0.1) + 'px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('MC', size * 0.5, size * 0.93);
    }

    // Generar previews
    SIZES.forEach(function(size) {
        var box = document.createElement('div');
        box.className = 'icon-box';

        var canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        // Limitar preview a 128px max
        var displaySize = Math.min(size, 128);
        canvas.style.width = displaySize + 'px';
        canvas.style.height = displaySize + 'px';
        canvas.id = 'icon-' + size;

        var ctx = canvas.getContext('2d');
        drawIcon(ctx, size);

        var label = document.createElement('span');
        label.textContent = size + 'x' + size;

        box.appendChild(canvas);
        box.appendChild(label);
        document.getElementById('preview').appendChild(box);
    });

    // Descargar todos como archivos individuales
    function downloadAll() {
        SIZES.forEach(function(size, i) {
            setTimeout(function() {
                var canvas = document.getElementById('icon-' + size);
                var link = document.createElement('a');
                link.download = 'icon-' + size + 'x' + size + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }, i * 300); // Espaciar descargas para que el navegador no las bloquee
        });
        document.getElementById('status').innerHTML = '<p class="done">Iconos descargados. Muevelos a public/img/icons/</p>';
    }
    </script>
</body>
</html>
